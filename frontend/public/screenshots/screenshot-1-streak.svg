  <rect x="100" y="1312" width="880" height="108" rx="20" fill="#f97316" filter="url(#orange-glow)" opacity="0.35"/>
  <rect x="100" y="1312" width="880" height="108" rx="20" fill="#f97316"/>
  <text x="540" y="1380" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#000000" text-anchor="middle">🔥 Check in on Celo</text>

  <!-- Add DROP token button -->
  <rect x="100" y="1448" width="880" height="96" rx="20" fill="transparent" stroke="#222222" stroke-width="2" stroke-dasharray="12,6"/>
  <text x="540" y="1504" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#888888" text-anchor="middle">+ Add DROP to wallet</text>

  <!-- ── HOW IT WORKS ── -->
  <text x="60" y="1620" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#888888" letter-spacing="-0.5">How it works</text>

  <!-- Steps -->
  <rect x="60" y="1644" width="960" height="80" rx="16" fill="#111111" stroke="#222222" stroke-width="2"/>
  <rect x="84" y="1666" width="36" height="36" rx="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="1.5"/>
  <text x="102" y="1690" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f97316" text-anchor="middle">1</text>
  <text x="144" y="1692" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#f5f5f5">Connect wallet (MiniPay, MetaMask, etc.)</text>

