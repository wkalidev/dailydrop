    <text x="632" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#444444" text-anchor="middle">6</text>
    <!-- Day 7 - empty -->
    <circle cx="748" cy="52" r="42" fill="none" stroke="#222222" stroke-width="3"/>
    <text x="748" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#444444" text-anchor="middle">7</text>
