    <circle cx="40" cy="38" r="30" fill="#f97316"/>
    <path d="M40 18 C50 28 58 37 58 46 C58 55 51 62 40 62 C29 62 22 55 22 46 C22 37 30 28 40 18Z" fill="#ffffff" opacity="0.95"/>
