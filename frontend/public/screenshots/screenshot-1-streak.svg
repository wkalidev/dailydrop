    <circle cx="516" cy="52" r="42" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="3"/>
    <circle cx="516" cy="52" r="56" fill="none" stroke="#f97316" stroke-width="2" opacity="0.3"/>
    <text x="516" y="61" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f97316" text-anchor="middle">✓</text>
