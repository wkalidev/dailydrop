  <text x="60" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#f97316" letter-spacing="-2">Earn DROP.</text>
  <text x="60" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#888888">7-day streak = 10 DROP tokens. On Celo &amp; Base.</text>

