  <text x="236" y="1148" font-family="'Courier New', monospace" font-size="44" font-weight="700" fill="#f5f5f5" text-anchor="middle">31</text>
  <text x="236" y="1184" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">TOTAL CHECK-INS</text>
  <!-- Stat card 2 -->
  <rect x="404" y="1096" width="272" height="132" rx="20" fill="#1a1a1a" stroke="#222222" stroke-width="2"/>
  <text x="540" y="1148" font-family="'Courier New', monospace" font-size="44" font-weight="700" fill="#f5f5f5" text-anchor="middle">40.00</text>
  <text x="540" y="1184" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">DROP BALANCE</text>
  <!-- Stat card 3 -->
  <rect x="708" y="1096" width="272" height="132" rx="20" fill="#1a1a1a" stroke="#222222" stroke-width="2"/>
  <text x="844" y="1148" font-family="'Courier New', monospace" font-size="44" font-weight="700" fill="#22c55e" text-anchor="middle">Ready!</text>
  <text x="844" y="1184" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">NEXT CHECK-IN</text>

