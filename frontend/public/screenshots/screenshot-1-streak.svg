<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-glow2" cx="80%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>

    <!-- Orange button glow -->
    <filter id="orange-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Phone frame clip -->
    <clipPath id="phone-clip">
      <rect x="0" y="0" width="1080" height="1920" rx="0" ry="0"/>
    </clipPath>

    <!-- Skeleton shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="50%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1080" height="1920" fill="#0a0a0a"/>
  <rect width="1080" height="1920" fill="url(#bg-glow)"/>
  <rect width="1080" height="1920" fill="url(#bg-glow2)"/>

  <!-- ── Status bar ── -->
  <text x="72" y="84" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="600" fill="#f5f5f5">9:41</text>
  <!-- Signal bars -->
  <rect x="846" y="54" width="14" height="30" rx="3" fill="#f5f5f5"/>
  <rect x="866" y="46" width="14" height="38" rx="3" fill="#f5f5f5"/>
  <rect x="886" y="38" width="14" height="46" rx="3" fill="#f5f5f5"/>
  <rect x="906" y="30" width="14" height="54" rx="3" fill="#f5f5f5"/>
  <!-- Wifi -->
  <path d="M944 66 Q960 50 976 66" stroke="#f5f5f5" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M952 76 Q960 68 968 76" stroke="#f5f5f5" stroke-width="6" fill="none" stroke-linecap="round"/>
  <circle cx="960" cy="86" r="6" fill="#f5f5f5"/>
  <!-- Battery -->
  <rect x="996" y="42" width="60" height="30" rx="6" fill="none" stroke="#f5f5f5" stroke-width="3"/>
  <rect x="1056" y="50" width="8" height="14" rx="2" fill="#f5f5f5"/>
  <rect x="999" y="45" width="48" height="24" rx="4" fill="#f5f5f5"/>

  <!-- Dynamic Island -->
