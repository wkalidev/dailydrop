  <rect x="60" y="556" width="228" height="128" rx="20" fill="#111111" stroke="#222222" stroke-width="2"/>
  <text x="174" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f97316" text-anchor="middle">1,247</text>
  <text x="174" y="654" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">TOTAL CHECK-INS</text>
  <!-- Card 2 -->
  <rect x="304" y="556" width="228" height="128" rx="20" fill="#111111" stroke="#222222" stroke-width="2"/>
  <text x="418" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f97316" text-anchor="middle">389</text>
  <text x="418" y="654" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">UNIQUE WALLETS</text>
  <!-- Card 3 -->
  <rect x="548" y="556" width="228" height="128" rx="20" fill="#111111" stroke="#222222" stroke-width="2"/>
  <text x="662" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f97316" text-anchor="middle">241</text>
  <text x="662" y="654" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">CELO</text>
  <!-- Card 4 -->
  <rect x="792" y="556" width="228" height="128" rx="20" fill="#111111" stroke="#222222" stroke-width="2"/>
  <text x="906" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#f97316" text-anchor="middle">148</text>
  <text x="906" y="654" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#888888" text-anchor="middle" letter-spacing="1">BASE</text>

