  <rect x="84" y="1762" width="36" height="36" rx="18" fill="rgba(249,115,22,0.15)" stroke="#f97316" stroke-width="1.5"/>
  <text x="102" y="1786" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f97316" text-anchor="middle">2</text>
  <text x="144" y="1788" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#f97316" font-weight="600">Click Check-in once a day  ←  You are here</text>

  <!-- ── FOOTER ── -->
