  <text x="228" y="860" font-family="'Courier New', monospace" font-size="180" font-weight="700" fill="#f97316" filter="url(#text-glow)" opacity="0.3">5</text>
  <text x="228" y="860" font-family="'Courier New', monospace" font-size="180" font-weight="700" fill="#f97316">5</text>

