  <rect x="80" y="255" width="300" height="130" rx="16" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="230" y="330" font-family="monospace" font-size="72" font-weight="700" fill="#f97316" text-anchor="middle">7</text>
  <text x="230" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#555555" text-anchor="middle" letter-spacing="2">DAY STREAK</text>
  <!-- Stat 2 -->
  <rect x="420" y="255" width="360" height="130" rx="16" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="600" y="330" font-family="monospace" font-size="72" font-weight="700" fill="#f97316" text-anchor="middle">10</text>
  <text x="600" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#555555" text-anchor="middle" letter-spacing="2">DROP TOKENS</text>
  <!-- Stat 3 -->
  <rect x="820" y="255" width="300" height="130" rx="16" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="970" y="325" font-family="monospace" font-size="52" font-weight="700" fill="#f97316" text-anchor="middle">24h</text>
  <text x="970" y="368" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#555555" text-anchor="middle" letter-spacing="2">CHECK-IN</text>
  <!-- Bottom -->
  <line x1="80" y1="420" x2="1120" y2="420" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Pills -->
  <rect x="80" y="445" width="110" height="36" rx="18" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="135" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#aaaaaa" text-anchor="middle">CELO</text>
  <rect x="205" y="445" width="110" height="36" rx="18" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="260" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#aaaaaa" text-anchor="middle">BASE</text>
  <rect x="330" y="445" width="150" height="36" rx="18" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="405" y="468" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="600" fill="#aaaaaa" text-anchor="middle">MINIPAY</text>
