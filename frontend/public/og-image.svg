<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <circle cx="200" cy="150" r="350" fill="#f97316" opacity="0.05"/>
  <circle cx="1050" cy="520" r="280" fill="#f97316" opacity="0.04"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#161616" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#161616" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#161616" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#161616" stroke-width="1"/>
  <!-- Logo -->
  <circle cx="100" cy="110" r="60" fill="#f97316"/>
  <path d="M100 68 C113 86 126 100 126 118 C126 136 115 146 100 146 C85 146 74 136 74 118 C74 100 87 86 100 68Z" fill="#ffffff" opacity="0.95"/>
  <circle cx="89" cy="114" r="14" fill="#ffffff" opacity="0.35"/>
  <!-- Wordmark -->
  <text x="185" y="135" font-family="system-ui,-apple-system,sans-serif" font-size="96" font-weight="700" letter-spacing="-4" fill="#ffffff">Daily<tspan fill="#f97316">Drop</tspan></text>
  <!-- Tagline -->
  <text x="185" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="32" fill="#666666" letter-spacing="0">Check in daily on-chain. Earn DROP tokens.</text>
